<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto - PoliTech</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

  <!-- Navbar -->
  <header class="navbar">
    <a href="../index.html" class="logo">PoliTech</a>
    <nav>
      <a href="../index.html">Home</a>
      <a href="servicios.html">Servicios</a>
      <a href="favoritos.html">Favoritos</a>
      <a href="contacto.html" class="active">Contacto</a>
      <a href="#" class="btn-crear">Crear</a>
    </nav>
  </header>

  <!-- Contact Form Section -->
  <main class="centered-content">
    <div class="contact-container">

      <div class="contact-header">
        <p>*Todos los campos son Obligatorios*</p>
      </div>

      <form action="#" class="contact-form">
        <div class="form-group">
          <label for="nombre">Nombre:</label>
          <input type="text" id="nombre" name="nombre" placeholder="Escriba su nombre" required>
        </div>

        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" placeholder="Escriba su correo" required>
        </div>

        <div class="form-group">
          <label for="mensaje">Mensaje:</label>
          <textarea id="mensaje" name="mensaje" placeholder="Escriba su mensaje de consulta" required></textarea>
        </div>

        <div class="contact-cta">
          <button type="submit" class="btn-contactar">Contactar</button>
        </div>
      </form>
    </div>
  </main>


  <!-- Footer -->
  <footer>
    <a href="#" class="link-footer">Sobre Nosotros</a>
    <a href="contacto.html" class="link-footer">Contacto</a>
    <a href="#" class="link-footer">Síguenos</a>
  </footer>

  <!-- Success Modal -->
  <div id="modal-success" class="modal">
    <div class="modal-content">
      <div class="modal-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>

      <h2>¡Enviado con éxito!</h2>
      <p>Gracias por contactarnos. Te responderemos lo antes posible.</p>
      <button class="btn-close-modal" onclick="closeModal()">Cerrar</button>
    </div>
  </div>

  <script src="../js/script.js"></script>

</body>
</html>
