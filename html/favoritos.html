<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favoritos - PoliTech</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

  <!-- Navbar -->
  <header class="navbar">
    <a href="../index.html" class="logo">PoliTech</a>
    <nav>
      <a href="../index.html">Home</a>
      <a href="servicios.html">Servicios</a>
      <a href="favoritos.html" class="active">Favoritos</a>
      <a href="contacto.html">Contacto</a>
      <a href="#" class="btn-crear">Crear</a>
    </nav>
  </header>

  <!-- Favoritos Section -->
  <main>
    <section class="hero">
      <h1>Mis Favoritos</h1>
      <p>Servicios que has guardado para ver más tarde</p>
    </section>

    <div class="favorites-container">
      <section id="favorites-list" class="services"></section>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <a href="#" class="link-footer">Sobre Nosotros</a>
    <a href="contacto.html" class="link-footer">Contacto</a>

  </footer>

  <!-- Success Modal -->
  <div id="modal-favorito" class="modal">
    <div class="modal-content">
      <div class="modal-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" 
             viewBox="0 0 24 24" fill="none" stroke="currentColor" 
             stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>

      <h2>¡Favorito guardado!</h2>
      <p>Tu elemento se ha agregado correctamente a la lista de favoritos.</p>
      <button class="btn-close-modal" onclick="closeFavModal()">Cerrar</button>
    </div>
  </div>

  <script src="../js/script.js"></script>
  <script src="../js/favoritos.js"></script>
